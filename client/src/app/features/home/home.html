<app-page-shell>
  <section class="hero">
    <div class="hero__glow" aria-hidden="true"></div>

    <p class="hero__eyebrow">Your listening, decoded</p>

    <h1 class="hero__headline display-heading">
      Discover
      <span class="hero__echo" aria-hidden="true">
        <span>Discover</span>
        <span>Discover</span>
      </span>
    </h1>

    <p class="hero__subhead">
      Connect your Spotify account to see your top tracks, top artists, saved
      library, and listening history — all in one dashboard.
    </p>

    <div class="hero__actions">
      <button type="button" class="pill-button pill-button--solid pill-button--large" (click)="onLoginClick()">
        Login with Spotify
      </button>
    </div>
  </section>
</app-page-shell>
